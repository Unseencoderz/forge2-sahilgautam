name: PulseDesk CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Laravel Backend Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pulsedesk_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring,bcmath,pdo_mysql,intl,dom,fileinfo
          coverage: none

      - name: Install Composer deps
        working-directory: backend
        run: composer install --prefer-dist --no-interaction

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: Set DB credentials for CI
        working-directory: backend
        run: |
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=pulsedesk_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate

      - name: Run migrations + seeder
        working-directory: backend
        run: php artisan migrate --seed --force

      - name: Run Pest tests
        working-directory: backend
        run: ./vendor/bin/pest --ci

  frontend-build:
    name: React Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  quality-gate:
    name: Quality Gate
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "✅ PulseDesk CI green — ready for human review"